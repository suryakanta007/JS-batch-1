<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ecommerce Cart</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<a href="#" class="logo">Ecommerce</a>

<div id="cart-icon">
<i class="ri-shopping-bag-line"></i>
<span class="cart-count"></span>
</div>

</header>


<!-- CART SIDEBAR -->

<div class="cart ">

<h2 class="cart-title">Your Cart</h2>

<div class="cart-content">

</div>

<div class="cart-total">
<span>Total</span>
<span class="total-price">₹0</span>
</div>

<button class="buy-btn">Buy Now</button>

<i class="ri-close-line cart-close"></i>

</div>



<section class="shop">

<h1 class="section-title">Shop Products</h1>

<div class="product-content">

<div class="product-box">
<img src="https://images.pexels.com/photos/19189138/pexels-photo-19189138.jpeg">
<h2 class="product-title">Blue Linen Shirt</h2>
<div class="price-cart">
<span class="price">₹400</span>
<i class="ri-shopping-bag-line add-cart"></i>
</div>
</div>

<div class="product-box">
<img src="https://images.pexels.com/photos/14798947/pexels-photo-14798947.jpeg">
<h2 class="product-title">Purple Oversize Shirt</h2>
<div class="price-cart">
<span class="price">₹500</span>
<i class="ri-shopping-bag-line add-cart"></i>
</div>
</div>

<div class="product-box">
<img src="https://images.pexels.com/photos/17858295/pexels-photo-17858295.jpeg">
<h2 class="product-title">Plain White T-Shirt</h2>
<div class="price-cart">
<span class="price">₹200</span>
<i class="ri-shopping-bag-line add-cart"></i>
</div>
</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
